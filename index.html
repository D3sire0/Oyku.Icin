<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Öykü'ye Sürpriz ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #0d0018;
    --violet:  #7209b7;
    --mid:      #9d4edd;
    --lavender:#c77dff;
    --blush:    #e8b4ff;
    --white:    #f5eeff;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 100%; height: 100vh;
    background: var(--bg);
    color: var(--white);
    font-family: 'Nunito', sans-serif;
    overflow: hidden;
    user-select: none;
  }

  #stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }

  .stage {
    position: fixed; inset: 0; z-index: 10;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px;
    opacity: 0; pointer-events: none;
    transition: opacity .6s ease;
  }
  .stage.on { opacity: 1; pointer-events: all; }

  .card {
    background: linear-gradient(145deg, rgba(58,0,104,.75), rgba(114,9,183,.3));
    border: 1px solid rgba(199,125,255,.25);
    border-radius: 28px;
    padding: 40px;
    backdrop-filter: blur(20px);
    text-align: center;
    max-width: 480px; width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }

  .char {
    width: min(160px, 38vw); margin-bottom: 20px;
    animation: bob 3.5s ease-in-out infinite;
    filter: drop-shadow(0 0 20px rgba(199,125,255,.4));
  }
  @keyframes bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }

  .dlg-text {
    font-family: 'Playfair Display', serif;
    font-size: clamp(18px, 4.5vw, 26px);
    font-style: italic;
    min-height: 90px;
    margin-bottom: 30px;
    transition: opacity 0.4s ease, transform 0.4s ease;
  }

  .btn {
    font-family: 'Nunito', sans-serif;
    font-size: 16px; font-weight: 700;
    padding: 14px 34px; border-radius: 100px; border: none;
    cursor: pointer; transition: all .2s;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--violet), #b53aff);
    color: #fff;
    box-shadow: 0 8px 25px rgba(114,9,183,.5);
  }
  .btn-ghost {
    background: rgba(114,9,183,.2);
    border: 1px solid rgba(199,125,255,.35);
    color: var(--blush);
  }

  /* Uçak */
  #plane-wrap { position: fixed; inset: 0; z-index: 80; pointer-events: none; display: none; }
  #plane-el { position: absolute; width: min(340px, 62vw); left: -400px; top: 50%; }

  /* Kalp Oyunu */
  #counter {
    position: fixed; top: 22px; width: 100%; text-align: center;
    z-index: 200; font-size: 20px; color: var(--lavender); display: none;
  }

  .heart-btn {
    position: fixed; z-index: 150; cursor: pointer; border: none; background: none;
    font-size: clamp(45px, 10vw, 65px);
    animation: heartFloat 3s ease-in-out infinite;
  }
  @keyframes heartFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

  #no-btn { position: fixed !important; transition: 0.1s; }
</style>
</head>
<body>

<canvas id="stars"></canvas>
<audio id="music" src="music.mp3" loop></audio>
<audio id="popSound" src="pop.mp3"></audio> <div id="plane-wrap">
    <img id="plane-el" src="ucak.png" alt="uçak">
</div>

<div id="counter">💜 Kalan Sevgi: <span id="cnt">15</span></div>

<div id="s1" class="stage on">
  <img src="karakter.png" class="char">
  <div class="card">
    <h2 style="font-family:'Playfair Display'; font-size: 32px; margin-bottom: 10px;">Merhaba Öykü.</h2>
    <p style="color:var(--blush); margin-bottom: 25px;">Sana özel ufak bir sürprizim var...</p>
    <button class="btn btn-primary" onclick="goPlane()">İsterim ❤️</button>
  </div>
</div>

<div id="s3" class="stage">
  <img src="karakter.png" class="char">
  <div class="card">
    <div class="dlg-text" id="dlg-text"></div>
    <div id="dlg-btns" style="opacity:0; transition: opacity 0.3s;"></div>
  </div>
</div>

<div id="s4" class="stage">
  <img src="karakter.png" class="char">
  <div class="card">
    <div class="dlg-text">Peki beni seviyor musun? 🥺</div>
    <div style="display:flex; gap:15px; justify-content:center;">
      <button class="btn btn-primary" onclick="celebrate()">Evet ❤️</button>
      <button class="btn btn-ghost" id="no-btn" onmouseenter="runAway()">Hayır 🙄</button>
    </div>
  </div>
</div>

<div id="s5" class="stage">
  <h1 style="font-family:'Playfair Display'; font-size: 48px; text-align:center;">OLEY! 🎉<br>Seni Çok Seviyorum Öykü!</h1>
</div>

<script>
/* Yıldızlar */
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
let w, h, stars = [];
function initStars() {
  w = canvas.width = window.innerWidth;
  h = canvas.height = window.innerHeight;
  stars = Array(150).fill().map(() => ({
    x: Math.random() * w, y: Math.random() * h,
    r: Math.random() * 1.5, o: Math.random()
  }));
}
function drawStars() {
  ctx.clearRect(0, 0, w, h);
  stars.forEach(s => {
    ctx.fillStyle = `rgba(255,255,255,${s.o})`;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
    s.o += (Math.random() - 0.5) * 0.05;
    if(s.o < 0) s.o = 0; if(s.o > 1) s.o = 1;
  });
  requestAnimationFrame(drawStars);
}
window.addEventListener('resize', initStars);
initStars(); drawStars();

/* Sahne Yönetimi */
function show(id) {
  document.querySelectorAll('.stage').forEach(s => s.classList.remove('on'));
  if(id) document.getElementById(id).classList.add('on');
}

/* Uçak Animasyonu */
function goPlane() {
  show(null);
  const wrap = document.getElementById('plane-wrap');
  const el = document.getElementById('plane-el');
  wrap.style.display = 'block';
  
  let x = -400;
  const anim = setInterval(() => {
    x += 8;
    el.style.left = x + 'px';
    el.style.top = (50 + Math.sin(x/100)*5) + '%';
    if(x > window.innerWidth + 400) {
      clearInterval(anim);
      wrap.style.display = 'none';
      startHearts();
    }
  }, 16);
}

/* Kalp Oyunu */
let hCount = 15;
function startHearts() {
  document.getElementById('counter').style.display = 'block';
  for(let i=0; i<15; i++) setTimeout(spawnHeart, i*150);
}

function spawnHeart() {
  const b = document.createElement('button');
  b.className = 'heart-btn';
  b.innerHTML = ['💜','💖','💗'][Math.floor(Math.random()*3)];
  b.style.left = (Math.random()*80 + 10) + 'vw';
  b.style.top = (Math.random()*70 + 15) + 'vh';
  b.onclick = () => {
    // Ses Çal
    const pop = document.getElementById('popSound');
    pop.currentTime = 0; pop.play();
    
    b.style.transform = 'scale(0)';
    setTimeout(() => b.remove(), 200);
    hCount--;
    document.getElementById('cnt').innerText = hCount;
    if(hCount === 0) {
      document.getElementById('counter').style.display = 'none';
      setTimeout(startDialogue, 600);
    }
  };
  document.body.appendChild(b);
}

/* Diyaloglar */
const lines = [
  "Kırk altı tane uçuşan kalp olsun isterdim.",
  "Fakat o çok fazla.",
  "Bizi ayrı bıraktığın her gün için 15 tane kalp koydum.",
  "Peki beğendin mi?"
];
let lIdx = 0;
let isAnimating = false; // Karışıklığı önlemek için kilit

function startDialogue() {
  document.getElementById('music').play();
  show('s3');
  nextDlg();
}

function nextDlg() {
  if(isAnimating) return; // Animasyon sürüyorsa tıklamayı reddet
  if(lIdx >= lines.length) { show('s4'); return; }

  const txt = document.getElementById('dlg-text');
  const btnArea = document.getElementById('dlg-btns');
  
  isAnimating = true;
  txt.style.opacity = '0';
  txt.style.transform = 'translateY(10px)';
  btnArea.style.opacity = '0';

  setTimeout(() => {
    txt.innerText = lines[lIdx];
    txt.style.opacity = '1';
    txt.style.transform = 'translateY(0)';
    
    // Butonları metinden biraz sonra göster
    setTimeout(() => {
      const isLast = lIdx === lines.length - 1;
      btnArea.innerHTML = isLast 
        ? `<button class="btn btn-primary" onclick="nextDlg()">Beğendim 😊</button>
           <button class="btn btn-ghost" onclick="nextDlg()" style="margin-left:10px;">Beğenmedim</button>`
        : `<button class="btn btn-primary" onclick="nextDlg()">Devam Et →</button>`;
      btnArea.style.opacity = '1';
      isAnimating = false; // Kilidi aç
      lIdx++;
    }, 400);
  }, 400);
}

/* Hayır Butonu Kaçırma */
function runAway() {
  const btn = document.getElementById('no-btn');
  btn.style.left = Math.random() * (window.innerWidth - 100) + 'px';
  btn.style.top = Math.random() * (window.innerHeight - 50) + 'px';
}

function celebrate() {
  show('s5');
  setInterval(() => {
    const d = document.createElement('div');
    d.innerHTML = '💜';
    d.style.position = 'fixed';
    d.style.left = Math.random() * 100 + 'vw';
    d.style.top = '-50px';
    d.style.transition = '4s linear';
    d.style.fontSize = Math.random() * 20 + 20 + 'px';
    document.body.appendChild(d);
    setTimeout(() => d.style.top = '110vh', 10);
    setTimeout(() => d.remove(), 4500);
  }, 100);
}
</script>
</body>
</html>
