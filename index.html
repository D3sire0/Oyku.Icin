<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sürpriz ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #10002b;
            --main: #7b2cbf;
            --accent: #e0aaff;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        #bg-canvas { position: fixed; inset: 0; z-index: 0; }

        #entry-screen {
            position: fixed; inset: 0; z-index: 1000;
            background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s ease;
        }

        .stage {
            position: fixed; inset: 0; z-index: 10;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: 0.6s ease;
            padding: 20px;
        }
        .stage.active { opacity: 1; pointer-events: all; }

        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 40px 25px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .headline {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: var(--accent);
        }

        .btn {
            background: var(--main);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 100px;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.3s;
            box-shadow: 0 8px 20px rgba(123, 44, 191, 0.4);
            cursor: pointer;
        }

        /* Patlama Parçacıkları */
        .particle {
            position: fixed;
            pointer-events: none;
            border-radius: 50%;
            z-index: 100;
        }

        #plane-wrap { position: fixed; inset: 0; z-index: 50; display: none; }
        #plane-img { position: absolute; width: 280px; left: -300px; top: 45%; filter: drop-shadow(0 0 20px var(--main)); }

        #ui {
            position: fixed; top: 20px; width: 100%; text-align: center;
            z-index: 100; font-size: 1.2rem; color: var(--accent); display: none;
            font-weight: bold; text-shadow: 0 0 10px var(--main);
        }

        .heart {
            position: fixed; font-size: 50px; z-index: 60;
            user-select: none; touch-action: manipulation;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .char { width: 160px; margin-bottom: 20px; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        #no-btn { position: absolute; transition: 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <audio id="music" src="music.mp3" loop></audio>
    <audio id="pop" src="pop.mp3"></audio>

    <div id="entry-screen">
        <button id="start-btn" class="btn" onclick="startLoading()">Oyunu Başlat</button>
    </div>

    <div id="ui">💜 Kalan: <span id="cnt">15</span></div>

    <div id="s1" class="stage">
        <div class="card">
            <img src="karakter.png" class="char">
            <h1 class="headline">Merhaba Öykü...</h1>
            <p style="margin-bottom: 25px; opacity: 0.8;">Senin için hazırladığım küçük bir oyun var. Başlamaya ne dersin?</p>
            <button class="btn" onclick="startPlane()">Hazırım ❤️</button>
        </div>
    </div>

    <div id="plane-wrap">
        <img id="plane-img" src="ucak.png">
        <div id="p-txt" style="position:fixed; bottom:20%; width:100%; text-align:center; font-family:'Playfair Display'; font-size:1.4rem; opacity:0; transition:1s;">O halde oyun başlıyor Birtanem...</div>
    </div>

    <div id="s2" class="stage">
        <div class="card">
            <img src="karakter.png" class="char">
            <div id="story-txt" style="font-size: 1.1rem; min-height: 80px; margin-bottom: 20px; line-height: 1.5;"></div>
            <div id="story-btns"></div>
        </div>
    </div>

    <div id="s3" class="stage">
        <div class="card" style="min-height: 300px; display: flex; flex-direction: column; justify-content: center;">
            <h1 class="headline">Peki beni seviyor musun?</h1>
            <div style="position: relative; height: 120px; margin-top: 20px;">
                <button class="btn" onclick="victory()" style="position: relative; z-index: 2;">Evet ❤️</button>
                <button class="btn" id="no-btn" onmouseover="dodge()" ontouchstart="dodge()" style="background: rgba(255,255,255,0.1); border: 1px solid white;">Hayır</button>
            </div>
        </div>
    </div>

    <div id="s4" class="stage">
        <div class="card">
            <h1 class="headline" style="font-size: 2.5rem;">OLEY! 🎉</h1>
            <p style="font-size: 1.2rem;">Seni çok seviyorum Öykü!</p>
        </div>
    </div>

    <script>
        const music = document.getElementById('music');
        const pop = document.getElementById('pop');
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');

        // Arka Plan Yıldızları
        let stars = [];
        function initStars() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = Array(100).fill().map(() => ({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2,
                speed: Math.random() * 0.5
            }));
        }
        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "rgba(255,255,255,0.5)";
            stars.forEach(s => {
                ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
                s.y -= s.speed; if(s.y < 0) s.y = canvas.height;
            });
            requestAnimationFrame(draw);
        }
        initStars(); draw();

        // Yükleme ve Başlatma
        function startLoading() {
            const btn = document.getElementById('start-btn');
            btn.innerText = "Oyun Yükleniyor...";
            btn.style.opacity = "0.7";
            btn.disabled = true;
            
            music.play().catch(() => console.log("Müzik için kullanıcı etkileşimi bekleniyor."));

            setTimeout(() => {
                document.getElementById('entry-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('entry-screen').style.display = 'none';
                    setActive('s1');
                }, 800);
            }, 1500);
        }

        function setActive(id) {
            document.querySelectorAll('.stage').forEach(s => s.classList.remove('active'));
            if(id) document.getElementById(id).classList.add('active');
        }

        // Patlama Efekti Fonksiyonu
        function createExplosion(x, y, color) {
            for (let i = 0; i < 8; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.innerText = '✨';
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                p.style.fontSize = Math.random() * 15 + 10 + 'px';
                
                const destX = (Math.random() - 0.5) * 200;
                const destY = (Math.random() - 0.5) * 200;
                
                document.body.appendChild(p);
                
                const anim = p.animate([
                    { transform: 'translate(0, 0) scale(1)', opacity: 1 },
                    { transform: `translate(${destX}px, ${destY}px) scale(0)`, opacity: 0 }
                ], {
                    duration: 600,
                    easing: 'cubic-bezier(0, .9, .57, 1)'
                });
                
                anim.onfinish = () => p.remove();
            }
        }

        // Uçak Akışı
        function startPlane() {
            setActive(null);
            const wrap = document.getElementById('plane-wrap');
            const img = document.getElementById('plane-img');
            const txt = document.getElementById('p-txt');
            wrap.style.display = 'block';

            let x = -350;
            const flight = setInterval(() => {
                x += 7;
                img.style.left = x + 'px';
                img.style.transform = `rotate(${Math.sin(x/50)*5}deg)`;
                if(x > window.innerWidth / 3) txt.style.opacity = '1';
                if(x > window.innerWidth + 350) {
                    clearInterval(flight);
                    wrap.style.display = 'none';
                    initHearts();
                }
            }, 16);
        }

        // Kalp Oyunu
        let left = 15;
        function initHearts() {
            document.getElementById('ui').style.display = 'block';
            for(let i=0; i<15; i++) {
                setTimeout(createHeart, i * 250);
            }
        }

        function createHeart() {
            const h = document.createElement('div');
            h.className = 'heart';
            h.innerHTML = '💜';
            h.style.left = (Math.random() * 80 + 10) + 'vw';
            h.style.top = (Math.random() * 70 + 15) + 'vh';
            
            h.onclick = (e) => {
                pop.currentTime = 0; 
                pop.play();
                
                // Patlama efektini tetikle
                createExplosion(e.clientX, e.clientY, '#e0aaff');
                
                h.style.transform = 'scale(1.5) rotate(45deg)';
                h.style.opacity = '0';
                left--;
                document.getElementById('cnt').innerText = left;
                setTimeout(() => h.remove(), 200);
                
                if(left === 0) {
                    document.getElementById('ui').style.display = 'none';
                    setTimeout(startStory, 600);
                }
            };
            document.body.appendChild(h);
        }

        // Hikaye
        const lines = [
            "Kırk altı tane uçuşan kalp olsun isterdim.",
            "Fakat o çok fazla...",
            "Bizi ayrı bıraktığın her gün için 15 tane kalp koydum.",
            "Peki beğendin mi?"
        ];
        let currentIdx = 0;

        function startStory() {
            setActive('s2');
            showLine();
        }

        function showLine() {
            const txt = document.getElementById('story-txt');
            const btns = document.getElementById('story-btns');
            txt.style.opacity = '0';
            btns.style.opacity = '0';

            setTimeout(() => {
                txt.innerText = lines[currentIdx];
                txt.style.opacity = '1';
                setTimeout(() => {
                    const isLast = currentIdx === lines.length - 1;
                    btns.innerHTML = isLast 
                        ? `<button class="btn" onclick="setActive('s3')">Beğendim 😊</button>`
                        : `<button class="btn" onclick="currentIdx++; showLine()">Devam Et</button>`;
                    btns.style.opacity = '1';
                }, 500);
            }, 300);
        }

        function dodge() {
            const btn = document.getElementById('no-btn');
            const padding = 50;
            const maxX = window.innerWidth - btn.offsetWidth - padding;
            const maxY = window.innerHeight - btn.offsetHeight - padding;

            const newX = Math.random() * (maxX - padding) + padding;
            const newY = Math.random() * (maxY - padding) + padding;

            btn.style.position = 'fixed';
            btn.style.left = newX + 'px';
            btn.style.top = newY + 'px';
        }

        function victory() {
            setActive('s4');
            setInterval(() => {
                const p = document.createElement('div');
                p.innerHTML = '💜';
                p.style.position = 'fixed';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.top = '-20px';
                p.style.fontSize = '20px';
                p.style.transition = '4s linear';
                document.body.appendChild(p);
                setTimeout(() => p.style.top = '110vh', 20);
                setTimeout(() => p.remove(), 4000);
            }, 150);
        }
    </script>
</body>
</html>
