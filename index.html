<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sürpriz ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;700&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0118;
            --main: #9d4edd;
            --accent: #e0aaff;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
        }

        #bg-canvas { position: fixed; inset: 0; z-index: 0; opacity: 0.6; }

        /* Gelişmiş Giriş ve Yükleme Ekranı */
        #entry-screen {
            position: fixed; inset: 0; z-index: 1000;
            background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s ease;
        }

        .loader-container {
            width: 250px; text-align: center; display: none;
        }
        .loader-bar {
            width: 100%; height: 4px; background: rgba(255,255,255,0.1);
            border-radius: 10px; margin-top: 15px; overflow: hidden; position: relative;
        }
        .loader-progress {
            position: absolute; left: 0; top: 0; height: 100%;
            width: 0%; background: var(--main); box-shadow: 0 0 15px var(--main);
            transition: width 0.3s linear;
        }

        /* Sahne Yapısı */
        .stage {
            position: fixed; inset: 0; z-index: 10;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: 0.8s cubic-bezier(0.4, 0, 0.2, 1);
            padding: 20px;
        }
        .stage.active { opacity: 1; pointer-events: all; transform: translateY(0); }
        .stage:not(.active) { transform: translateY(20px); }

        .card {
            background: var(--glass);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 40px;
            padding: 40px 25px;
            width: 100%; max-width: 400px;
            text-align: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
        }

        .headline {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem; margin-bottom: 20px; color: var(--accent);
        }

        .btn {
            background: linear-gradient(135deg, var(--main), #5a189a);
            color: white; border: none; padding: 18px 40px;
            border-radius: 100px; font-weight: bold; font-size: 1rem;
            transition: 0.3s; letter-spacing: 1px;
            box-shadow: 0 10px 25px rgba(123, 44, 191, 0.3);
        }

        /* Uçak */
        #plane-wrap { position: fixed; inset: 0; z-index: 50; display: none; }
        #plane-img { position: absolute; width: 250px; left: -300px; top: 40%; filter: drop-shadow(0 0 30px var(--main)); }

        /* Kalp Patlama Efekti */
        .particle {
            position: fixed; pointer-events: none;
            background: var(--accent); border-radius: 50%;
            z-index: 100;
        }

        .heart {
            position: fixed; font-size: 50px; z-index: 60; cursor: pointer;
            user-select: none; touch-action: manipulation;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
        }

        .char { width: 140px; margin-bottom: 25px; filter: drop-shadow(0 10px 20px var(--main)); }
        #ui { position: fixed; top: 30px; width: 100%; text-align: center; z-index: 100; font-weight: bold; display: none; color: var(--accent); }

        #no-btn { position: absolute; transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <audio id="music" src="music.mp3" loop></audio>
    <audio id="pop" src="pop.mp3"></audio>

    <div id="entry-screen">
        <button id="start-init" class="btn" onclick="startLoading()">Oyunu Başlat</button>
        <div class="loader-container" id="loader-ui">
            <p style="font-size: 0.9rem; letter-spacing: 2px; color: var(--accent);">OYUN YÜKLENİYOR...</p>
            <div class="loader-bar"><div class="loader-progress" id="progress"></div></div>
        </div>
    </div>

    <div id="ui">Kalan Sevgi Parçası: <span id="cnt">15</span></div>

    <div id="s1" class="stage">
        <div class="card">
            <img src="karakter.png" class="char">
            <h1 class="headline">Hazır mısın?</h1>
            <p style="margin-bottom: 30px; opacity: 0.7; line-height: 1.6;">Bu küçük dijital evrende senin için sakladığım bir şeyler var.</p>
            <button class="btn" onclick="startPlane()">Başlayalım ✨</button>
        </div>
    </div>

    <div id="plane-wrap">
        <img id="plane-img" src="ucak.png">
        <div id="p-txt" style="position:fixed; bottom:20%; width:100%; text-align:center; font-family:'Playfair Display'; font-size:1.4rem; opacity:0; transition:1s;">Kemerlerini bağla...</div>
    </div>

    <div id="s2" class="stage">
        <div class="card">
            <div id="story-txt" style="font-size: 1.15rem; min-height: 100px; margin-bottom: 25px; line-height: 1.7;"></div>
            <div id="story-btns"></div>
        </div>
    </div>

    <div id="s3" class="stage">
        <div class="card" style="min-height: 350px; display: flex; flex-direction: column; justify-content: center;">
            <h1 class="headline">Peki beni hala seviyor musun?</h1>
            <div style="position: relative; height: 150px; margin-top: 30px;">
                <button class="btn" onclick="victory()" style="position: relative; z-index: 5;">Evet ❤️</button>
                <button class="btn" id="no-btn" onmouseover="dodge()" ontouchstart="dodge()" style="background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2);">Hayır</button>
            </div>
        </div>
    </div>

    <div id="s4" class="stage">
        <div class="card">
            <h1 class="headline" style="font-size: 2.2rem;">Harika! 🎉</h1>
            <p style="font-size: 1.1rem; opacity: 0.9;">Biliyorum, mesafe sadece bir sayıdan ibaret...</p>
            <p style="margin-top: 15px; color: var(--accent); font-weight: bold;">Seni Çok Seviyorum Öykü!</p>
        </div>
    </div>

    <script>
        const music = document.getElementById('music');
        const pop = document.getElementById('pop');

        // Yükleme Animasyonu
        function startLoading() {
            document.getElementById('start-init').style.display = 'none';
            document.getElementById('loader-ui').style.display = 'block';
            music.play().catch(() => console.log("Müzik etkileşim bekliyor"));
            
            let prog = 0;
            const bar = document.getElementById('progress');
            const interval = setInterval(() => {
                prog += Math.random() * 15;
                if(prog > 100) prog = 100;
                bar.style.width = prog + '%';
                
                if(prog >= 100) {
                    clearInterval(interval);
                    setTimeout(() => {
                        document.getElementById('entry-screen').style.opacity = '0';
                        setTimeout(() => {
                            document.getElementById('entry-screen').style.display = 'none';
                            setActive('s1');
                        }, 800);
                    }, 500);
                }
            }, 200);
        }

        // Patlama Efekti (Explosion)
        function explode(x, y) {
            for (let i = 0; i < 12; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 8 + 4;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                
                const angle = Math.random() * Math.PI * 2;
                const velocity = Math.random() * 10 + 5;
                const vx = Math.cos(angle) * velocity;
                const vy = Math.sin(angle) * velocity;
                
                document.body.appendChild(p);
                
                let opacity = 1;
                const anim = setInterval(() => {
                    p.style.left = parseFloat(p.style.left) + vx + 'px';
                    p.style.top = parseFloat(p.style.top) + vy + 'px';
                    opacity -= 0.05;
                    p.style.opacity = opacity;
                    if(opacity <= 0) {
                        clearInterval(anim);
                        p.remove();
                    }
                }, 20);
            }
        }

        function setActive(id) {
            document.querySelectorAll('.stage').forEach(s => s.classList.remove('active'));
            if(id) document.getElementById(id).classList.add('active');
        }

        // Uçak Sahnesi
        function startPlane() {
            setActive(null);
            const wrap = document.getElementById('plane-wrap');
            const img = document.getElementById('plane-img');
            wrap.style.display = 'block';

            let x = -300;
            const fly = setInterval(() => {
                x += 8;
                img.style.left = x + 'px';
                img.style.top = (40 + Math.sin(x/100) * 5) + '%';
                if(x > window.innerWidth / 3) document.getElementById('p-txt').style.opacity = '1';
                if(x > window.innerWidth + 300) {
                    clearInterval(fly);
                    wrap.style.display = 'none';
                    initHearts();
                }
            }, 16);
        }

        // Kalp Oyunu
        let count = 15;
        function initHearts() {
            document.getElementById('ui').style.display = 'block';
            for(let i=0; i<15; i++) {
                setTimeout(createHeart, i * 300);
            }
        }

        function createHeart() {
            const h = document.createElement('div');
            h.className = 'heart';
            h.innerHTML = '💜';
            h.style.left = (Math.random() * 80 + 10) + 'vw';
            h.style.top = (Math.random() * 70 + 15) + 'vh';
            
            const handlePop = (e) => {
                pop.currentTime = 0; pop.play();
                const rect = h.getBoundingClientRect();
                explode(rect.left + 25, rect.top + 25);
                h.remove();
                count--;
                document.getElementById('cnt').innerText = count;
                if(count === 0) {
                    document.getElementById('ui').style.display = 'none';
                    setTimeout(startStory, 600);
                }
            };

            h.addEventListener('click', handlePop);
            h.addEventListener('touchstart', handlePop);
            document.body.appendChild(h);
        }

        const lines = [
            "Her kalp patladığında, aslında aradaki mesafeleri siliyoruz.",
            "Bizi ayrı bıraktığın her gün için 15 kalp vardı orada...",
            "Ama biliyorsun, benim kalbim hep seninle.",
            "Sürprizi beğendin mi?"
        ];
        let lineIdx = 0;

        function startStory() {
            setActive('s2');
            showLine();
        }

        function showLine() {
            const txt = document.getElementById('story-txt');
            const btns = document.getElementById('story-btns');
            txt.style.opacity = '0';
            btns.style.opacity = '0';

            setTimeout(() => {
                txt.innerText = lines[lineIdx];
                txt.style.opacity = '1';
                setTimeout(() => {
                    const isLast = lineIdx === lines.length - 1;
                    btns.innerHTML = isLast 
                        ? `<button class="btn" onclick="setActive('s3')">Çok beğendim ❤️</button>`
                        : `<button class="btn" onclick="lineIdx++; showLine()">Devam Et</button>`;
                    btns.style.opacity = '1';
                }, 800);
            }, 400);
        }

        // Hayır Butonu Sınır Kontrolü
        function dodge() {
            const btn = document.getElementById('no-btn');
            const pad = 30;
            const x = Math.random() * (window.innerWidth - btn.offsetWidth - pad * 2) + pad;
            const y = Math.random() * (window.innerHeight - btn.offsetHeight - pad * 2) + pad;
            
            btn.style.position = 'fixed';
            btn.style.left = x + 'px';
            btn.style.top = y + 'px';
        }

        function victory() {
            setActive('s4');
            // Konfeti
            setInterval(() => {
                const p = document.createElement('div');
                p.innerHTML = '✨';
                p.style.position = 'fixed';
                p.style.left = Math.random() * 100 + 'vw';
                p.style.top = '-20px';
                p.style.transition = '4s linear';
                document.body.appendChild(p);
                setTimeout(() => p.style.top = '110vh', 20);
                setTimeout(() => p.remove(), 4000);
            }, 100);
        }

        // Arka Plan Yıldızları
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        function initStars() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = Array(80).fill().map(() => ({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                r: Math.random() * 1.5,
                v: Math.random() * 0.3
            }));
        }
        function drawStars() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "white";
            stars.forEach(s => {
                ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
                s.y -= s.v; if(s.y < 0) s.y = canvas.height;
            });
            requestAnimationFrame(drawStars);
        }
        initStars(); drawStars();
    </script>
</body>
</html>
