<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sürpriz ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&family=Playfair+Display:ital,wght@1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #10002b;
            --main: #7b2cbf;
            --accent: #e0aaff;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

        body {
            background: var(--bg);
            color: white;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            touch-action: none;
        }

        #bg-canvas { position: fixed; inset: 0; z-index: 0; }

        #entry-screen {
            position: fixed; inset: 0; z-index: 1000;
            background: var(--bg);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.8s ease;
        }

        .stage {
            position: fixed; inset: 0; z-index: 10;
            display: flex; align-items: center; justify-content: center;
            opacity: 0; pointer-events: none; transition: 0.6s ease;
            padding: 20px;
        }
        .stage.active { opacity: 1; pointer-events: all; }

        .card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            padding: 40px 25px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            z-index: 20;
        }

        .headline {
            font-family: 'Playfair Display', serif;
            font-size: 1.8rem;
            margin-bottom: 20px;
            color: var(--accent);
        }

        .btn {
            background: var(--main);
            color: white;
            border: none;
            padding: 16px 32px;
            border-radius: 100px;
            font-weight: bold;
            font-size: 1rem;
            transition: 0.3s;
            box-shadow: 0 8px 20px rgba(123, 44, 191, 0.4);
            cursor: pointer;
        }

        .heart {
            position: fixed;
            font-size: 55px;
            z-index: 60;
            user-select: none;
            cursor: pointer;
            filter: drop-shadow(0 0 15px var(--main));
            animation: heartbeat 1.2s ease-in-out infinite, floatAround 6s ease-in-out infinite;
        }

        @keyframes heartbeat {
            0%, 30%, 60%, 100% { transform: scale(1); }
            15% { transform: scale(1.2); }
            45% { transform: scale(1.1); }
        }

        @keyframes floatAround {
            0%, 100% { translate: 0 0; }
            50% { translate: -10px -20px; }
        }

        .particle { position: fixed; pointer-events: none; z-index: 100; font-size: 20px; }
        
        #plane-wrap { position: fixed; inset: 0; z-index: 50; display: none; }
        #plane-img { position: absolute; width: 280px; left: -300px; top: 45%; filter: drop-shadow(0 0 20px var(--main)); }

        /* Final Uçak ve Pankart - DÜZELTİLDİ */
        .victory-plane {
            position: fixed;
            display: flex;
            flex-direction: row-reverse; /* Pankartı uçağın arkasına (soluna) atar */
            align-items: center;
            z-index: 5;
            pointer-events: none;
        }

        .victory-plane img {
            width: 120px;
            filter: drop-shadow(0 0 10px var(--main));
            z-index: 2;
        }

        .banner {
            background: var(--main);
            color: white;
            padding: 6px 18px;
            border-radius: 4px;
            font-weight: bold;
            font-family: 'Playfair Display', serif;
            position: relative;
            box-shadow: 0 0 15px var(--main);
            animation: bannerWave 1.2s ease-in-out infinite;
            white-space: nowrap;
            font-size: 1.1rem;
            z-index: 1;
        }

        /* Uçak ile Pankart Arasındaki İp */
        .banner::after {
            content: "";
            position: absolute;
            right: -25px; /* Pankartın sağından uçağın kuyruğuna doğru */
            top: 50%;
            width: 25px;
            height: 2px;
            background: rgba(255,255,255,0.4);
        }

        @keyframes bannerWave {
            0%, 100% { transform: rotate(-3deg) translateY(0); }
            50% { transform: rotate(3deg) translateY(-5px); }
        }

        #ui {
            position: fixed; top: 20px; width: 100%; text-align: center;
            z-index: 100; font-size: 1.2rem; color: var(--accent); display: none;
            font-weight: bold; text-shadow: 0 0 10px var(--main);
        }

        .char { width: 160px; margin-bottom: 20px; animation: float 3s ease-in-out infinite; }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        #no-btn { position: absolute; transition: 0.1s linear; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>
    <audio id="music" src="music.mp3" loop></audio>
    <audio id="pop" src="pop.mp3"></audio>

    <div id="entry-screen">
        <button id="main-start-btn" class="btn" onclick="loadingSequence()">Oyunu Başlat</button>
    </div>

    <div id="ui">💜 Kalan: <span id="cnt">15</span></div>

    <div id="s1" class="stage">
        <div class="card">
            <img src="karakter.png" class="char">
            <h1 class="headline">Merhaba Öykü...</h1>
            <p style="margin-bottom: 25px; opacity: 0.8;">Küçük bir oyun hazırladım. Hazır mısın?</p>
            <button class="btn" onclick="startPlane()">Hazırım ❤️</button>
        </div>
    </div>

    <div id="plane-wrap">
        <img id="plane-img" src="ucak.png">
        <div id="p-txt" style="position:fixed; bottom:20%; width:100%; text-align:center; font-family:'Playfair Display'; font-size:1.4rem; opacity:0; transition:1s;">Oyun başlıyor Birtanem...</div>
    </div>

    <div id="s2" class="stage">
        <div class="card">
            <img src="karakter.png" class="char">
            <div id="story-txt" style="font-size: 1.1rem; min-height: 80px; margin-bottom: 20px; line-height: 1.5;"></div>
            <div id="story-btns"></div>
        </div>
    </div>

    <div id="s3" class="stage">
        <div class="card" style="min-height: 320px; display: flex; flex-direction: column; justify-content: center;">
            <h1 class="headline">Peki beni seviyor musun?</h1>
            <div style="position: relative; height: 150px; margin-top: 20px;">
                <button class="btn" onclick="victory()" style="position: relative; z-index: 25;">Evet ❤️</button>
                <button class="btn" id="no-btn" onmouseover="dodge()" ontouchstart="dodge()" style="background: rgba(255,255,255,0.1); border: 1px solid white;">Hayır</button>
            </div>
        </div>
    </div>

    <div id="s4" class="stage">
        <div class="card">
            <h1 class="headline" style="font-size: 2.5rem;">OLEY! 🎉</h1>
            <p style="font-size: 1.2rem;">Seni çok seviyorum Öykü!</p>
        </div>
    </div>

    <script>
        const music = document.getElementById('music');
        const pop = document.getElementById('pop');
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');

        let stars = [];
        function initStars() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = Array(80).fill().map(() => ({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height,
                size: Math.random() * 2,
                speed: Math.random() * 0.5
            }));
        }
        function draw() {
            ctx.clearRect(0,0,canvas.width, canvas.height);
            ctx.fillStyle = "rgba(255,255,255,0.3)";
            stars.forEach(s => {
                ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI*2); ctx.fill();
                s.y -= s.speed; if(s.y < 0) s.y = canvas.height;
            });
            requestAnimationFrame(draw);
        }
        initStars(); draw();

        function loadingSequence() {
            const btn = document.getElementById('main-start-btn');
            btn.innerText = "Oyun Yükleniyor...";
            music.play().catch(() => {});
            setTimeout(() => {
                document.getElementById('entry-screen').style.opacity = '0';
                setTimeout(() => {
                    document.getElementById('entry-screen').style.display = 'none';
                    setActive('s1');
                }, 800);
            }, 1500);
        }

        function setActive(id) {
            document.querySelectorAll('.stage').forEach(s => s.classList.remove('active'));
            if(id) document.getElementById(id).classList.add('active');
        }

        function burstEffect(x, y) {
            for (let i = 0; i < 10; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.innerHTML = ['✨', '💜'][Math.floor(Math.random()*2)];
                p.style.left = x + 'px'; p.style.top = y + 'px';
                document.body.appendChild(p);
                const a = Math.random()*Math.PI*2;
                const d = Math.random()*100+50;
                p.animate([
                    { transform: 'translate(0,0) scale(1)', opacity: 1 },
                    { transform: `translate(${Math.cos(a)*d}px, ${Math.sin(a)*d}px) scale(0)`, opacity: 0 }
                ], { duration: 700 }).onfinish = () => p.remove();
            }
        }

        function startPlane() {
            setActive(null);
            const wrap = document.getElementById('plane-wrap');
            wrap.style.display = 'block';
            let x = -350;
            const flight = setInterval(() => {
                x += 8;
                document.getElementById('plane-img').style.left = x + 'px';
                if(x > window.innerWidth/3) document.getElementById('p-txt').style.opacity = '1';
                if(x > window.innerWidth+350) {
                    clearInterval(flight);
                    wrap.style.display = 'none';
                    initHeartGame();
                }
            }, 16);
        }

        let heartsLeft = 15;
        function initHeartGame() {
            document.getElementById('ui').style.display = 'block';
            for(let i=0; i<15; i++) setTimeout(spawnHeart, i*300);
        }

        function spawnHeart() {
            const h = document.createElement('div');
            h.className = 'heart'; h.innerHTML = '💜';
            h.style.left = (Math.random()*70+15)+'vw'; h.style.top = (Math.random()*60+20)+'vh';
            h.style.animationDelay = `${Math.random()*2}s`;
            const action = (e) => {
                const cx = e.touches ? e.touches[0].clientX : e.clientX;
                const cy = e.touches ? e.touches[0].clientY : e.clientY;
                pop.currentTime=0; pop.play(); burstEffect(cx, cy); h.remove();
                heartsLeft--; document.getElementById('cnt').innerText = heartsLeft;
                if(heartsLeft===0) { document.getElementById('ui').style.display='none'; setTimeout(startStory, 800); }
            };
            h.addEventListener('touchstart', (e) => { e.preventDefault(); action(e); });
            h.addEventListener('mousedown', action);
            document.body.appendChild(h);
        }

        const lines = ["Bizi ayrı bıraktığın her gün için 46 tane kalp koymak isterdim.", "Fakat o çok fazla olduğu için...", "Temsilli 15 tane kalp koydum Bitanem", "Peki beğendin mi?"];
        let currentLine = 0;
        function startStory() { setActive('s2'); nextText(); }
        function nextText() {
            const txt = document.getElementById('story-txt');
            const btns = document.getElementById('story-btns');
            txt.style.opacity = '0'; btns.style.opacity = '0';
            setTimeout(() => {
                txt.innerText = lines[currentLine];
                txt.style.opacity = '1';
                setTimeout(() => {
                    btns.innerHTML = currentLine === lines.length - 1 
                        ? `<button class="btn" onclick="setActive('s3')">Beğendim 😊</button>` 
                        : `<button class="btn" onclick="currentLine++; nextText()">Devam Et</button>`;
                    btns.style.opacity = '1';
                }, 800);
            }, 400);
        }

        function dodge() {
            const btn = document.getElementById('no-btn');
            btn.style.position = 'fixed';
            btn.style.left = Math.random()*(window.innerWidth-100)+'px';
            btn.style.top = Math.random()*(window.innerHeight-50)+'px';
        }

        // FİNAL: Uçaklar ve Pankartlar (Uçak sağda, Pankart solda olacak şekilde)
        function createVictoryPlane() {
            const container = document.createElement('div');
            container.className = 'victory-plane';
            
            const plane = document.createElement('img');
            plane.src = 'ucak.png';
            
            const banner = document.createElement('div');
            banner.className = 'banner';
            banner.innerText = 'Love ❤️';
            
            container.appendChild(plane);
            container.appendChild(banner);
            document.body.appendChild(container);

            const startY = Math.random() * (window.innerHeight - 150) + 75;
            const speed = Math.random() * 2 + 4;
            let x = -500; // Ekranın solundan başlar

            const fly = setInterval(() => {
                x += speed;
                container.style.left = x + 'px';
                container.style.top = startY + 'px';
                if (x > window.innerWidth + 600) {
                    clearInterval(fly);
                    container.remove();
                }
            }, 16);
        }

        function victory() {
            setActive('s4');
            setInterval(() => {
                const p = document.createElement('div');
                p.innerHTML = '💜'; p.style.position = 'fixed';
                p.style.left = Math.random()*100+'vw'; p.style.top = '-50px';
                p.style.transition = '4s linear'; p.style.zIndex = "1";
                document.body.appendChild(p);
                setTimeout(() => p.style.top = '110vh', 20);
                setTimeout(() => p.remove(), 4000);
            }, 150);

            createVictoryPlane();
            setInterval(createVictoryPlane, 3500);
        }
    </script>
</body>
</html>
